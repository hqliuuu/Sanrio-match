        // 复制提示词
        function copyPrompt(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 提示词已复制到剪贴板');
            }).catch(err => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✅ 提示词已复制到剪贴板');
            });
        }

        // 打开Suno AI
        function openSuno(prompt) {
            const url = `https://suno.ai`;
            window.open(url, '_blank');
            showToast('🎵 请在 Suno AI 中选择 "Custom Mode" 并粘贴提示词');
        }

        // 打开ElevenLabs
        function openElevenLabs() {
            window.open('https://elevenlabs.io/sound-effects', '_blank');
            showToast('🔊 请在 ElevenLabs 中粘贴音效提示词');
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 页面加载完成后渲染
        document.addEventListener('DOMContentLoaded', () => {
            renderMusicList();

            // 模拟进度条
            const progressBar = document.getElementById('progressBar');
            setTimeout(() => { progressBar.style.width = '100%'; }, 100);
            setTimeout(() => { progressBar.style.opacity = '0'; }, 500);
        });
    </script>
</body>
</html>
