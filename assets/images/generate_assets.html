                case 'dalle': return asset.dalle;
                default: return asset.midjourney;
            }
        }

        // 渲染素材列表
        function renderAssets() {
            const container = document.getElementById('assetsContainer');
            let html = '';

            for (const [category, assets] of Object.entries(assetsDB)) {
                // 过滤
                let filteredAssets = assets;
                if (currentFilter !== 'all') {
                    if (currentFilter.startsWith('p')) {
                        filteredAssets = assets.filter(a => a.priority === currentFilter);
                    } else {
                        filteredAssets = assets.filter(a => a.category === currentFilter);
                    }
                }

                if (filteredAssets.length === 0) continue;

                const categoryNames = {
                    pieces: '🍬 消除元素',
                    characters: '👑 角色立绘',
                    backgrounds: '🖼️ 背景图',
                    ui: '🎯 UI元素'
                };

                html += `
                    <div class="category-section">
                        <div class="category-header">
                            <div class="category-title">${categoryNames[category]}</div>
                            <div class="category-count">${filteredAssets.length} 个</div>
                        </div>
                        <div class="assets-grid">
                `;

                filteredAssets.forEach(asset => {
                    const prompt = getPrompt(asset);
                    const safePrompt = prompt.replace(/'/g, "\\'");

                    html += `
                        <div class="asset-card ${asset.priority}">
                            <div class="asset-header">
                                <span class="asset-filename">${asset.filename}</span>
                                <span class="asset-priority priority-${asset.priority}">${asset.priority.toUpperCase()}</span>
                            </div>
                            <div class="asset-title">${asset.title}</div>
                            <div class="asset-specs">
                                ${asset.specs.map(spec => `<span class="spec-tag">${spec}</span>`).join('')}
                            </div>
                            <div class="prompt-container">
                                <div class="prompt-label">
                                    <span>📋 ${currentTool.toUpperCase()} 提示词</span>
                                    <span>点击复制</span>
                                </div>
                                <div class="prompt-text">${prompt}</div>
                            </div>
                            <div class="asset-actions">
                                <button class="btn-copy" onclick="copyPrompt('${safePrompt}', '${asset.filename}')">
                                    📋 复制提示词
                                </button>
                                <button class="btn-generate" onclick="openAITool()">
                                    🎨 去生成
                                </button>
                            </div>
                        </div>
                    `;
                });

                html += '</div></div>';
            }

            container.innerHTML = html;
        }

        // 复制提示词
        function copyPrompt(prompt, filename) {
            navigator.clipboard.writeText(prompt).then(() => {
                showToast(`✅ ${filename} 提示词已复制！`);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = prompt;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✅ 提示词已复制！');
            });
        }

        // 复制全部提示词
        function copyAllPrompts() {
            let allPrompts = `🎨 三丽鸥消消乐 - ${currentTool.toUpperCase()} 提示词大全\\n`;
            allPrompts += '═══════════════════════════════════════════════════\\n\\n';

            for (const [category, assets] of Object.entries(assetsDB)) {
                allPrompts += `【${category}】\\n`;
                assets.forEach((asset, i) => {
                    allPrompts += `${i+1}. ${asset.filename}\\n`;
                    allPrompts += `${getPrompt(asset)}\\n\\n`;
                });
            }

            navigator.clipboard.writeText(allPrompts).then(() => {
                showToast('✅ 全部提示词已复制！');
            });
        }

        // 打开AI工具
        function openAITool() {
            let url = 'https://www.midjourney.com';
            if (currentTool === 'sd') url = 'https://stablediffusionweb.com';
            if (currentTool === 'dalle') url = 'https://chat.openai.com';
            window.open(url, '_blank');
        }

        function openMidjourney() {
            window.open('https://www.midjourney.com', '_blank');
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 初始化
        renderAssets();
    </script>
</body>
</html>
